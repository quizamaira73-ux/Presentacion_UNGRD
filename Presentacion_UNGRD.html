# Colombia frente al cambio climático

## Análisis de incendios forestales, inundaciones y emergencias ambientales

### Visualización para la Analítica de Datos
### Maestría en Ciencia de Datos y Analítica

**Universidad Nacional Abierta y a Distancia - UNAD**

**2026**
---

# Contexto

Colombia es uno de los países con mayor diversidad geográfica y climática de América Latina, condición que lo hace especialmente vulnerable a fenómenos como inundaciones, incendios forestales, movimientos en masa, vendavales y avenidas torrenciales.

Durante los últimos años estos eventos han generado miles de emergencias, afectando a millones de personas y ocasionando importantes pérdidas sociales, económicas y ambientales.

Ante este panorama, la Unidad Nacional para la Gestión del Riesgo de Desastres (UNGRD) consolida información oficial que permite comprender el comportamiento de estas emergencias y fortalecer la toma de decisiones para la prevención y la adaptación al cambio climático.
---
# Pregunta orientadora

¿Cómo se distribuyen territorialmente las emergencias asociadas a incendios forestales, inundaciones y otros fenómenos ambientales en Colombia, y qué patrones pueden identificarse para fortalecer la gestión del riesgo y la adaptación al cambio climático?
---
# Objetivo general

Analizar la distribución espacial y temporal de las emergencias ambientales reportadas en Colombia, identificando patrones asociados a incendios forestales, inundaciones y otros eventos climáticos, mediante técnicas de visualización de datos y Data Storytelling.
---
# Objetivos específicos

- Identificar los tipos de emergencias ambientales más frecuentes en Colombia.

- Analizar la evolución temporal de los eventos registrados.

- Determinar los departamentos y municipios con mayor recurrencia de emergencias.

- Construir visualizaciones estadísticas y geográficas para apoyar la interpretación de los datos.

- Elaborar una narrativa de datos que facilite la comunicación de hallazgos para la toma de decisiones.
---
# Fuente de datos

## Dataset utilizado

El análisis se desarrolló a partir de la base de datos oficial de la **Unidad Nacional para la Gestión del Riesgo de Desastres (UNGRD)**, que consolida los eventos de emergencia registrados en Colombia entre **2019 y 2022**.

## Características del conjunto de datos

- **25.857 registros** de emergencias.
- **34 departamentos** con registros.
- **1.016 municipios** reportados.
---
# Variables analizadas

- Fecha del evento.
- Tipo de emergencia.
- Departamento.
- Municipio.
- Personas afectadas.
- Viviendas afectadas.
- Fallecidos.
- Heridos.
- Desaparecidos.
---
# Metodología

El proceso metodológico se desarrolló mediante las siguientes etapas:

1. Recolección de la base de datos oficial de la UNGRD.
2. Limpieza y transformación de la información en R.
3. Construcción del conjunto de datos para el análisis.
4. Análisis exploratorio de datos (EDA).
5. Elaboración de visualizaciones.
6. Construcción de la narrativa visual mediante Data Storytelling para comunicar los principales hallazgos.
---
# ¿Cómo evolucionaron las emergencias en Colombia?

## Evolución anual de los eventos registrados (2019–2022)

.center[
&lt;img src="grafico_01_emergencias_anio.png" width="70%"&gt;
]

### Hallazgos

- Se analizaron **25.857 emergencias** registradas entre 2019 y 2022.
- En **2022** se observa el mayor número de eventos reportados.
- Entre **2020 y 2021** el comportamiento fue relativamente estable.

### Mensaje clave

El incremento registrado en **2022** evidencia una mayor ocurrencia de emergencias, lo que resalta la necesidad de fortalecer las estrategias de prevención y gestión del riesgo.

---
# ¿Qué tipos de emergencias fueron los más frecuentes?

## Ranking de los principales eventos registrados (2019–2022)

.center[
&lt;img src="grafico_02_top_eventos.png" width="70%"&gt;
]
---
# ¿Qué nos revela este comportamiento?

## Principales hallazgos

- Entre **2019 y 2022**, el **incendio de cobertura vegetal** fue el tipo de emergencia con mayor número de registros, con más de **7.600 eventos**.

- Los **movimientos en masa** ocuparon el segundo lugar, seguidos por las **inundaciones**, evidenciando la alta exposición del territorio colombiano a fenómenos naturales.

- Eventos como **vendavales**, **incendios estructurales** y **crecientes súbitas** también presentan una frecuencia importante, aunque menor frente a los tres primeros.

## Mensaje clave

La alta frecuencia de incendios de cobertura vegetal, movimientos en masa e inundaciones refleja la necesidad de fortalecer las acciones de prevención, monitoreo ambiental y gestión del riesgo para reducir el impacto de estos eventos sobre la población y el territorio.
---
# ¿En qué departamentos se concentraron las emergencias?

## Departamentos con mayor número de eventos registrados (2019–2022)

.center[
&lt;img src="grafico_03_top_departamentos.png" width="70%"&gt;
]
---
# ¿Qué nos indica la distribución territorial?

## Principales hallazgos

- **Cundinamarca** registró el mayor número de emergencias durante el período analizado, con cerca de **3.900 eventos**.

- **Antioquia** ocupó el segundo lugar, seguido por **Cauca** y **Meta**, departamentos que también presentan una alta recurrencia de emergencias.

- Otros departamentos como **Huila**, **Norte de Santander**, **Tolima**, **Santander**, **Nariño** y **Boyacá** completan el grupo con mayor número de registros.

## Mensaje clave

La concentración de emergencias en estos departamentos evidencia la necesidad de fortalecer las estrategias regionales de prevención, planificación territorial y gestión del riesgo, priorizando las zonas con mayor recurrencia de eventos.
---
# ¿Qué municipios registraron el mayor número de emergencias?

## Municipios con mayor recurrencia de eventos (2019–2022)

.center[
&lt;img src="grafico_04_top_municipios.png" width="70%"&gt;
]
---
# ¿Qué revela la distribución de las emergencias a nivel municipal?

## Principales hallazgos

- **Villavicencio** registró el mayor número de emergencias durante el período analizado, con **306 eventos**.

- Le siguen **Pereira**, **Puerto López**, **Bogotá D.C.** y **Puerto Gaitán**, municipios que también presentan una alta recurrencia de emergencias.

- La presencia de municipios de diferentes regiones del país en este ranking evidencia que las emergencias no se concentran en una sola zona geográfica, sino que representan un desafío de alcance nacional.

## Mensaje clave

La identificación de los municipios con mayor recurrencia de emergencias permite orientar estrategias de prevención, fortalecer los sistemas de respuesta y priorizar la asignación de recursos para reducir el impacto de futuros eventos.
---
# ¿Qué tipo de emergencias afectaron a más personas?

## Impacto sobre la población (2019–2022)

.center[
&lt;img src="grafico_05_personas_afectadas.png" width="70%"&gt;
]
---
# ¿Qué nos revela el impacto sobre la población?

## Principales hallazgos

- Las **inundaciones** concentraron, por un amplio margen, el mayor número de personas afectadas durante el periodo 2019–2022, con más de **2,5 millones** de personas.

- Los **vendavales**, **movimientos en masa** y las **crecientes súbitas** ocuparon los siguientes lugares, aunque con un impacto considerablemente menor.

- Eventos como **avenidas torrenciales**, **temporales**, **incendios estructurales** y **sequías** también generaron afectaciones importantes sobre la población.

## Mensaje clave

Las inundaciones representan el fenómeno con mayor impacto humano en Colombia, lo que evidencia la necesidad de fortalecer las estrategias de prevención, los sistemas de alerta temprana y la planificación territorial para reducir el riesgo y proteger a las comunidades más vulnerables.
---

# ¿Qué tipo de emergencias afectaron al mayor número de viviendas?

## Impacto sobre la infraestructura habitacional (2019–2022)

&lt;center&gt;

&lt;img src="grafico_06_viviendas.png" width="65%"&gt;

&lt;/center&gt;

---

# ¿Qué nos revela el impacto sobre la infraestructura habitacional?

## Principales hallazgos

- Las **inundaciones** fueron el evento que ocasionó el mayor número de **viviendas afectadas** durante el periodo 2019–2022, superando ampliamente a los demás tipos de emergencia.

- Los **vendavales**, **movimientos en masa** y las **crecientes súbitas** también registraron daños importantes sobre la infraestructura habitacional, aunque con una magnitud considerablemente menor.

- Fenómenos como **temporales**, **avenidas torrenciales**, **granizadas** e **incendios estructurales** presentaron afectaciones relevantes en diferentes territorios, evidenciando la diversidad de amenazas que enfrenta el país.

## Mensaje clave

Las inundaciones representan la principal amenaza para la infraestructura habitacional en Colombia, lo que evidencia la necesidad de fortalecer la prevención y la gestión del riesgo.

---

# ¿En qué meses se registran más emergencias?

## Comportamiento estacional de las emergencias (2019–2022)

&lt;center&gt;

&lt;img src="grafico_07_estacionalidad.png" width="60%"&gt;

&lt;/center&gt;

---

# ¿Qué revela la estacionalidad de las emergencias?

## Principales hallazgos

- Las emergencias presentaron un comportamiento estacional durante el periodo **2019–2022**.

- **Marzo** registró el mayor número de emergencias (**3.106**), seguido de **febrero** (**2.803**) y **enero** (**2.337**).

- Entre **junio** y **julio** se observó la menor ocurrencia de eventos, con una recuperación gradual entre **agosto** y **noviembre**.

- **Diciembre** volvió a presentar una disminución en el número de emergencias registradas.

## Mensaje clave

Los resultados evidencian que las emergencias presentan un patrón estacional, concentrándose principalmente durante los primeros meses del año. Conocer este comportamiento facilita la planificación de acciones de prevención, preparación y respuesta para reducir el impacto de futuros eventos.

---

## Conclusiones

- Se identificó un incremento de las emergencias en **2022**, siendo el año con mayor número de eventos registrados.

- Los **incendios de cobertura vegetal**, **movimientos en masa** e **inundaciones** fueron las emergencias más recurrentes.

- Las **inundaciones** generaron el mayor impacto sobre la población y la infraestructura habitacional.

- Los departamentos y municipios con mayor recurrencia evidencian zonas prioritarias para la gestión del riesgo.

- El análisis estacional mostró que las emergencias se concentran principalmente durante los primeros meses del año.

---

## Recomendaciones

- Priorizar acciones preventivas en los territorios con mayor recurrencia de emergencias.

- Fortalecer los sistemas de monitoreo y alerta temprana durante los periodos de mayor riesgo.

- Continuar utilizando herramientas de **visualización de datos** y **Data Storytelling** para apoyar la toma de decisiones y comunicar los resultados de manera clara y efectiva.

## Mensaje final

**La visualización de datos y el Data Storytelling permitieron transformar miles de registros de la UNGRD en evidencia útil para comprender el comportamiento de las emergencias y apoyar la toma de decisiones en la gestión del riesgo en Colombia.**
